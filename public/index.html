<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOC Tracker — Login</title>
  <meta name="description" content="SOC Analyst Learning Tracker — track your cybersecurity training progress with friends">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="badge">// SECURE ACCESS //</div>
        <h1>SOC TRACKER</h1>
        <div class="subtitle">ANALYST TRAINING SYSTEM</div>
      </div>

      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchAuthTab('login')" id="tab-login">LOGIN</div>
        <div class="auth-tab" onclick="switchAuthTab('register')" id="tab-register">REGISTER</div>
      </div>

      <!-- Login Form -->
      <form class="auth-form active" id="form-login" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn" id="btn-login">ACCESS SYSTEM ▸</button>
        <div class="auth-error" id="login-error"></div>
      </form>

      <!-- Register Form -->
      <form class="auth-form" id="form-register" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="reg-username">Choose Username</label>
          <input type="text" id="reg-username" autocomplete="username" required minlength="2" maxlength="20">
        </div>
        <div class="form-group">
          <label for="reg-password">Choose Password</label>
          <input type="password" id="reg-password" autocomplete="new-password" required minlength="4">
        </div>
        <button type="submit" class="btn btn-cyan" id="btn-register">CREATE OPERATIVE ▸</button>
        <div class="auth-error" id="register-error"></div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="/js/auth.js"></script>
</body>
</html>
